<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salary Predictor</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="header">
          <h1>Salary Predictor</h1>
          <p>Estimate a salary using a simple Linear Regression model.</p>
        </header>

        <form id="predictForm" class="form">
          <label class="field">
            <span>Years of experience</span>
            <input
              id="experience"
              type="number"
              inputmode="decimal"
              min="0"
              step="0.1"
              placeholder="e.g., 2.5"
              required
            />
          </label>

          <label class="field">
            <span>Skills rating (1–10)</span>
            <input
              id="skills"
              type="number"
              inputmode="numeric"
              min="1"
              max="10"
              step="1"
              placeholder="e.g., 7"
              required
            />
          </label>

          <button id="predictBtn" type="submit" class="btn">
            <span class="btnText">Predict</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>

          <div id="message" class="message" role="status" aria-live="polite"></div>
        </form>

        <footer class="footer">
          <div class="result" id="result" aria-live="polite"></div>
        </footer>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
